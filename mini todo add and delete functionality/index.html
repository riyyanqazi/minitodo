<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple To-Do App</title>
    <style>
      /* ===== Global ===== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }
      body {
        background: #313131;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding-top: 50px;
      } /* ===== Container ===== */
      .todo-container {
        background: #fff;
        padding: 20px 30px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      } /* ===== Input Section ===== */
      .todo-input {
        display: flex;
        margin-bottom: 20px;
      }
      .todo-input input {
        flex: 1;
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 5px 0 0 5px;
        outline: none;
        font-size: 16px;
      }
      .todo-input button {
        padding: 10px 15px;
        border: none;
        background: #28a745;
        color: white;
        font-size: 16px;
        cursor: pointer;
        border-radius: 0 5px 5px 0;
        transition: background 0.3s;
      }
      .todo-input button:hover {
        background: #218838;
      } /* ===== To-Do List ===== */
      ul.todo-list {
        list-style: none;
      }
      ul.todo-list li {
        padding: 10px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 5px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: background 0.2s;
      }
      ul.todo-list li:hover {
        background: #eee;
      }
      ul.todo-list li button {
        background: #dc3545;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.3s;
      }
      ul.todo-list li button:hover {
        background: #c82333;
      }
    </style>
  </head>
  <body>
    <div class="todo-container">
      <h1>To-Do List</h1>
      <div class="todo-input">
        <input type="text" placeholder="Enter a new task" />
        <button id="add">Add</button>
      </div>
      <ul class="todo-list"></ul>
    </div>
    <script src="todo.js"></script>
  </body>
</html>
